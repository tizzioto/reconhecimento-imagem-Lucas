<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine - Classificador</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-custom {
            background: #1e1e2f;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #webcam-container canvas {
            border-radius: 15px;
            width: 100%;
            height: auto;
        }

        .btn-start {
            font-size: 18px;
            padding: 12px 25px;
            border-radius: 30px;
            transition: 0.3s;
        }

        .btn-start:hover {
            transform: scale(1.05);
        }

        .progress {
            height: 25px;
            border-radius: 15px;
            overflow: hidden;
        }

        .label-text {
            font-size: 14px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card-custom text-center">

        <h2 class="mb-4">🤖 Classificador de Imagens</h2>

        <button class="btn btn-success btn-start mb-4" onclick="init()">
            📷 Permitir Câmera
        </button>

        <div id="webcam-container" class="mb-4"></div>

        <div id="label-container"></div>

    </div>
</div>

<!-- TensorFlow + Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
    const URL = "./my_model/";

    let model, webcam, labelContainer, maxPredictions;
    let progressBars = [];

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(300, 300, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        progressBars = [];

        for (let i = 0; i < maxPredictions; i++) {
            const wrapper = document.createElement("div");
            wrapper.classList.add("mb-3", "text-start");

            const label = document.createElement("div");
            label.classList.add("label-text");
            label.innerHTML = "Classe";

            const progress = document.createElement("div");
            progress.classList.add("progress");

            const bar = document.createElement("div");
            bar.classList.add("progress-bar", "bg-info");
            bar.style.width = "0%";
            bar.innerHTML = "0%";

            progress.appendChild(bar);
            wrapper.appendChild(label);
            wrapper.appendChild(progress);

            labelContainer.appendChild(wrapper);
            progressBars.push({ label, bar });
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);

        for (let i = 0; i < maxPredictions; i++) {
            const prob = prediction[i].probability;
            const percent = (prob * 100).toFixed(1) + "%";

            progressBars[i].label.innerHTML = prediction[i].className;
            progressBars[i].bar.style.width = percent;
            progressBars[i].bar.innerHTML = percent;
        }
    }
</script>

</body>
</html>
